    <style>
        /* アニメーションと基本設定 */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            -webkit-user-select: none;
            -moz-user-select: none;

        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        /* ◯❌マークのアニメーション */
        @keyframes markPop {
            0% { transform: scale(0.3); opacity: 0; }
            40% { transform: scale(1.2); opacity: 1; }
            70% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .animate-mark-pop {
            animation: markPop 1s ease-out forwards;
        }

        /* ご当地キャラひょっこりアニメーション */
        @keyframes rightPop {
            0%, 40%, 100% { transform: translate(100%, 100%) rotate(20deg); }
            10% { transform: translate(-10%, -40%) rotate(-10deg); } 
            20% { transform: translate(-10%, -30%) rotate(-5deg); }  
            30% { transform: translate(-10%, -40%) rotate(-10deg); }
        }
        .animate-right-pop {
            animation: rightPop 7s ease-in-out infinite;
        }

        @keyframes leftPop {
            0%, 40%, 100% { transform: translate(-100%, 100%) rotate(-20deg); }
            10% { transform: translate(10%, -40%) rotate(10deg); } 
            20% { transform: translate(10%, -30%) rotate(5deg); }
            30% { transform: translate(10%, -40%) rotate(10deg); }

        .animate-left-pop {
            animation: leftPop 9s ease-in-out infinite;

                    container.classList.remove('hidden');
                    container.classList.add('flex');
                }

        });

        window.handleInstallClick = async function() {
            if (isLine && !isStandalone) {

                return;
            }

            if (deferredPrompt) {
                deferredPrompt.prompt();

                    const container = document.getElementById('install-button-container');

        };

        function initAudio() {
            if (isAudioInitialized) return;
            try {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                gain.gain.value = 0;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.01);
                isAudioInitialized = true;
            } catch (e) {
                console.log("Web Audio API not supported");
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(987.77, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
                oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
                gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.25);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.6);
            } else {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(130, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.02);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime + 0.15);
                gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.18);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.6);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.6);
            }
        }

        function shuffle(array) {
            let newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

                console.log(`✅ Firestoreから ${QUIZ_DATA.length} 問のクイズを読み込みました`);
                
                loadAds();
                window.setMode('home');

                `;
            }
        }

        async function saveScoreToFirestore(points) {
            if (!currentUser.nickname || !currentUser.userId || !db) return;
            
            const userRef = doc(db, "users", currentUser.userId);
            try {
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const currentData = userSnap.data();
                    await setDoc(userRef, {
                        ...currentData,
                        score: (currentData.score || 0) + points,
                        nickname: currentUser.nickname,
                        prefecture: currentUser.prefecture,
                        updatedAt: new Date().toISOString()
                    });
                } else {
                    await setDoc(userRef, {
                        nickname: currentUser.nickname,
                        prefecture: currentUser.prefecture,
                        score: points,
                        updatedAt: new Date().toISOString()
                    });
                }
            } catch (e) {
                console.error("ランキングの保存に失敗", e);
            }
        }

        window.startQuiz = function(type, categoryName = null) {
            initAudio(); 
            let availableQuestions = QUIZ_DATA.filter(q => !usedQuestionIds.has(q.id));
            if (type === 'category') availableQuestions = availableQuestions.filter(q => q.category === categoryName);

            let requiredCount = 5;
            if (type === 'category') requiredCount = 4;
            if (type === 'hard') requiredCount = 10;

            if (availableQuestions.length < requiredCount) {
                errorMsg = `【警告】このモードに挑戦するための残り問題数が不足しています（残り: ${availableQuestions.length}問 / 必要: ${requiredCount}問）。ホーム画面から「挑戦履歴をリセット」してください。`;
                window.setMode('home');
                return;
            }

            const selected = shuffle(availableQuestions).slice(0, requiredCount);
            currentQuiz = selected.map(q => ({ ...q, options: shuffle([...q.options]) }));
            selected.forEach(q => usedQuestionIds.add(q.id));

            let title = '';
            if (type === 'hard') title = '【激ムズ】真の県民愛テスト';
            else if (type === 'random') title = '全ジャンル・ランダム5番勝負！';
            else title = `${categoryName}の難問に挑戦`;

            quizConfig = { title, count: requiredCount, type, category: categoryName };
            currentIndex = 0;
            score = 0;
            wrongAnswers = []; 
            selectedOption = null;
            isAnswered = false;
            errorMsg = '';
            
            window.setMode('quiz');
        }

        window.handleAnswer = function(option) {
            if (isAnswered) return;
            selectedOption = option;
            isAnswered = true;
            
            const currentQ = currentQuiz[currentIndex];
            const isCorrect = (option === currentQ.answer);
            
            playSound(isCorrect ? 'correct' : 'wrong');
            showMark(isCorrect);
            
            if (isCorrect) score++;
            else {
                wrongAnswers.push({
                    question: currentQ.question,
                    answer: currentQ.answer,
                    explanation: currentQ.explanation
                });
            }
            renderQuiz();
        }

        window.handleNext = function() {
            initAudio();
            if (currentIndex < currentQuiz.length - 1) {
                currentIndex++;
                selectedOption = null;
                isAnswered = false;
                renderQuiz();
            } else {
                saveScoreRecord(); 
                window.setMode('result');
            }
        }

        window.continueQuiz = function() { window.startQuiz(quizConfig.type, quizConfig.category); }

        window.handleResetMemory = function() {
            initAudio();
            usedQuestionIds = new Set();
            errorMsg = '';
            renderHome();
        }

        window.shareApp = async function(type) {
            const shareUrl = window.location.href.split('?')[0]; 
            const shareText = "地元民しか解けない！？激ムズ「福井県民クイズショー」に挑戦！あなたの福井愛を試そう🦖🦀";

            if (type === 'native' && navigator.share) {
                try {
                    await navigator.share({
                        title: '福井県民クイズショー',
                        text: shareText,
                        url: shareUrl,
                    });
                } catch (err) {
                    console.log('シェアをキャンセル、またはエラー', err);
                }
            } else if (type === 'line') {
                const url = `https://line.me/R/msg/text/?${encodeURIComponent(shareText + '\n' + shareUrl)}`;
                window.open(url, '_blank');
            } else if (type === 'twitter') {
                const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
                window.open(url, '_blank');
            } else if (type === 'copy') {
                try {
                    await navigator.clipboard.writeText(`${shareText}\n${shareUrl}`);
                    alert("クリップボードにコピーしました！そのまま貼り付けてシェアしてください。");

                            <input type="hidden" id="main-site-url-input" value="${currentMainSiteUrl}">
                            <input type="hidden" id="line-stamp-url-input" value="${currentLineStampUrl}">
                            <input type="hidden" id="line-stamp-img-url-input" value="${currentLineStampImgUrl}">

                            <div class="pt-2 text-center">
                                <button onclick="window.saveLegalDocs(this)" class="w-full md:w-auto min-w-[240px] py-4 px-8 rounded-xl bg-slate-800 hover:bg-slate-900 text-white font-black border-2 border-slate-800 shadow-[4px_4px_0_0_#1e293b] active:translate-y-[4px] active:translate-x-[4px] active:shadow-none transition-all text-lg mx-auto">
                                    規約情報を保存する
                                </button>
                            </div>
                        </div>
                `;
            }

            let html = `
            <div class="flex-1 p-6 w-full animate-fade-in relative z-10">
                <div class="max-w-3xl mx-auto">
                    <button onclick="window.setMode('home')" class="text-slate-600 hover:text-blue-600 mb-6 flex items-center gap-2 transition-colors font-black bg-white border-2 border-slate-800 px-4 py-2 rounded-lg shadow-[2px_2px_0_0_#1e293b] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none w-max">
                        ← ホームに戻る
                    </button>
                    
                    <div class="bg-white border-4 border-slate-800 rounded-3xl p-6 md:p-10 shadow-[8px_8px_0_0_#1e293b] mb-10">
                        <div class="flex items-center justify-center gap-3 mb-6">
                            <span class="text-3xl">⚙️</span>
                            <h2 class="text-2xl md:text-3xl font-black text-slate-800">管理者設定</h2>
                        </div>
                        
                        ${tabHtml}
                        ${contentHtml}

                    </div>
                </div>
            </div>`;
            appRoot.innerHTML = html;
        }

        function renderContact() {
            window.scrollTo(0, 0);

            let html = `
            <div class="flex-1 p-6 w-full animate-fade-in relative z-10">
                <div class="max-w-2xl mx-auto">
                    <button onclick="window.setMode('home')" class="text-slate-600 hover:text-blue-600 mb-6 flex items-center gap-2 transition-colors font-black bg-white border-2 border-slate-800 px-4 py-2 rounded-lg shadow-[2px_2px_0_0_#1e293b] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none w-max">
                        ← ホームに戻る
                    </button>
                    
                    <div class="bg-white border-4 border-slate-800 rounded-3xl p-6 md:p-10 shadow-[8px_8px_0_0_#1e293b] mb-10">
                        <div class="flex items-center justify-center gap-3 mb-6 border-b-2 border-slate-200 pb-6">
                            <div class="text-blue-500 w-8 h-8 md:w-10 md:h-10">${ICONS.Mail}</div>
                            <h2 class="text-xl md:text-3xl font-black text-slate-800">福井県民クイズショー<br class="md:hidden"/> お問い合わせ</h2>
                        </div>
                        
                        <div class="bg-yellow-50 border-2 border-yellow-400 p-5 rounded-xl mb-8 shadow-sm">
                            <h3 class="font-black text-yellow-900 text-lg mb-3 flex items-center gap-2">
                                <span>💡</span> 各自治体・お店などの皆様へ
                            </h3>
                            <p class="font-bold text-yellow-800 text-sm leading-relaxed mb-4">
                                当サイトのリンクはご自由に（※不正・法律に触れるようなサイトの当サイトのリンクはお断りいたします）。
                            </p>
                            <div class="bg-white p-4 rounded-xl border-2 border-yellow-200 shadow-[2px_2px_0_0_#fef08a]">
                                <p class="font-bold text-slate-700 text-sm leading-relaxed">
                                    お問い合わせありがとうございます。<br>
                                    当クイズサイトに関しては、もしよければリンクしていただければと思います。<br><br>
                                    当サイトにリンクをご希望の方は、HPやInstagram、HPのタイトルなどを以下のフォームよりお申し出ください。<br><br>
                                </p>
                            </div>
                        </div>

                        <form id="contactForm" class="space-y-6">
                            <div>
                                <label for="name" class="block text-sm font-black text-slate-800 mb-2">お名前 / 団体名 <span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded ml-1 align-middle">必須</span></label>
                                <input type="text" id="name" name="name" required class="w-full px-4 py-3 rounded-xl border-2 border-slate-800 bg-slate-50 focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all">
                            </div>
                            
                            <div>
                                <label for="email" class="block text-sm font-black text-slate-800 mb-2">メールアドレス <span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded ml-1 align-middle">必須</span></label>
                                <input type="email" id="email" name="email" required class="w-full px-4 py-3 rounded-xl border-2 border-slate-800 bg-slate-50 focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all">
                            </div>

                            <div>
                                <label for="inquiryType" class="block text-sm font-black text-slate-800 mb-2">お問い合わせ種別 <span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded ml-1 align-middle">必須</span></label>
                                <div class="relative">
                                    <select id="inquiryType" name="inquiryType" required class="w-full px-4 py-3 rounded-xl border-2 border-slate-800 bg-slate-50 focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all appearance-none cursor-pointer">
                                        <option value="" disabled selected>選択してください</option>
                                        <option value="相互リンク・サイト紹介について">相互リンク・サイト紹介について</option>
                                        <option value="クイズ問題の追加・修正について">クイズ問題の追加・修正について</option>
                                        <option value="その他のお問い合わせ">その他のお問い合わせ</option>
                                    </select>
                                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-800">
                                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                                    </div>
                                </div>
                            </div>

                            <div class="border-t-2 border-slate-200 pt-6 mt-6 bg-blue-50 p-5 rounded-2xl border-2 border-blue-200">
                                <h4 class="font-black text-blue-800 text-sm flex items-center gap-2 mb-4">
                                    <div class="w-4 h-4">${ICONS.Link}</div>
                                    ▼ 相互リンクをご希望の方のみご記入ください
                                </h4>
                                
                                <div class="space-y-4">
                                    <div>
                                        <label for="siteTitle" class="block text-sm font-black text-slate-800 mb-2">HPやサイトのタイトル <span class="bg-slate-400 text-white text-[10px] px-2 py-0.5 rounded ml-1 align-middle">任意</span></label>
                                        <input type="text" id="siteTitle" name="siteTitle" class="w-full px-4 py-3 rounded-xl border-2 border-slate-800 bg-white focus:outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all">
                                    </div>

                                    <div>
                                        <label for="siteUrl" class="block text-sm font-black text-slate-800 mb-2">HPのURL / Instagramアカウント等 <span class="bg-slate-400 text-white text-[10px] px-2 py-0.5 rounded ml-1 align-middle">任意</span></label>
                                        <input type="text" id="siteUrl" name="siteUrl" class="w-full px-4 py-3 rounded-xl border-2 border-slate-800 bg-white focus:outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all">
                                    </div>

                                    <div>
                                        <label for="sitePr" class="block text-sm font-black text-slate-800 mb-2">自己PR・サイトの紹介文 <span class="bg-slate-400 text-white text-[10px] px-2 py-0.5 rounded ml-1 align-middle">任意</span></label>
                                        <textarea id="sitePr" name="sitePr" rows="3" class="w-full px-4 py-3 rounded-xl border-2 border-slate-800 bg-white focus:outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all resize-none"></textarea>
                                    </div>
                                </div>
                            </div>

                            <div class="border-t-2 border-slate-200 pt-6 mt-6">
                                <label for="message" class="block text-sm font-black text-slate-800 mb-2">その他お問い合わせ内容・ご要望など <span class="bg-slate-400 text-white text-[10px] px-2 py-0.5 rounded ml-1 align-middle">任意</span></label>
                                <textarea id="message" name="message" rows="5" class="w-full px-4 py-3 rounded-xl border-2 border-slate-800 bg-slate-50 focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all resize-none"></textarea>
                            </div>

                            <div class="pt-4 text-center">
                                <button type="submit" id="submitBtn" class="w-full md:w-auto min-w-[240px] py-4 px-8 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-black border-2 border-slate-800 shadow-[4px_4px_0_0_#1e293b] active:translate-y-[4px] active:translate-x-[4px] active:shadow-none transition-all text-lg flex items-center justify-center gap-2 mx-auto">
                                    <span id="btnText">送信する</span>
                                    <svg id="btnSpinner" class="animate-spin -mr-1 ml-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                </button>
                            </div>
                            
                            <div id="resultMessage" class="mt-4 text-center font-bold hidden rounded-xl p-4 border-2"></div>
                        </form>
                    </div>
                </div>
            </div>`;
            
            appRoot.innerHTML = html;

            const form = document.getElementById('contactForm');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const resultMessage = document.getElementById('resultMessage');

            const GAS_WEB_APP_URL = localStorage.getItem('fukui_quiz_gas_url') || '';

            form.addEventListener('submit', async (e) => {
                e.preventDefault(); 

                if(!GAS_WEB_APP_URL || GAS_WEB_APP_URL === 'ここにウェブアプリのURLを貼り付けてください') {
                    alert('管理画面（⚙️）からGASのウェブアプリURLを設定してください。');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-70', 'cursor-not-allowed', 'shadow-none', 'translate-y-[4px]', 'translate-x-[4px]');
                btnText.textContent = '送信中...';
                btnSpinner.classList.remove('hidden');
                resultMessage.classList.add('hidden');

                const formData = new FormData(form);
                const data = new URLSearchParams(formData);

                try {
                    const response = await fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        body: data,
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        }
                    });

                    const result = await response.json();

                    if (result.status === 'success') {
                        form.reset(); 
                        resultMessage.innerHTML = '✅ お問い合わせを送信しました。<br>自動返信メールをご確認ください。';
                        resultMessage.className = 'mt-4 text-center font-bold text-emerald-800 bg-emerald-50 border-emerald-500 p-4 rounded-xl border-2';
                    } else {
                        throw new Error(result.message || '送信に失敗しました');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    resultMessage.textContent = '❌ エラーが発生しました。時間をおいて再度お試しください。';
                    resultMessage.className = 'mt-4 text-center font-bold text-red-800 bg-red-50 border-red-500 p-4 rounded-xl border-2';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-70', 'cursor-not-allowed', 'shadow-none', 'translate-y-[4px]', 'translate-x-[4px]');
                    btnText.textContent = '送信する';
                    btnSpinner.classList.add('hidden');
                    resultMessage.classList.remove('hidden');
                }
            });
        }

        // ==========================================
        // 🚀 アプリの起動
        // ==========================================
        fetchQuizData();
        
        if ('serviceWorker' in navigator && window.location.protocol.startsWith('http')) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('✅ ServiceWorker登録成功（PWAインストール準備完了）');
                    })
                    .catch(err => {
                        console.error('❌ ServiceWorker登録失敗: ', err);
                    });
            });
        } else {
            console.log('ℹ️ プレビュー環境のためPWAインストールはスキップされます。本番環境(https)では正常に動作します。');
        }
        
    </script>
</body>
</html>
